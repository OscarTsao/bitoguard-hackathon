name: BitoGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: Core Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: bitoguard_core/requirements.txt

      - name: Install dependencies
        working-directory: bitoguard_core
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run core tests (85 tests)
        working-directory: bitoguard_core
        run: |
          source .venv/bin/activate
          pytest tests/ -q --tb=short

  lint-frontend:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bitoguard_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: bitoguard_frontend
        run: npm ci

      - name: Lint frontend
        working-directory: bitoguard_frontend
        run: npm run lint

      - name: Build frontend
        working-directory: bitoguard_frontend
        run: npm run build

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test-core, lint-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy env template
        run: cp deploy/.env.compose.example .env

      - name: Build Docker images
        run: docker compose build

  # ── Deploy to AWS ECR+ECS (manual trigger or main branch only) ─────────────
  deploy-aws:
    name: Deploy to AWS (manual)
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build and push to ECR
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          chmod +x scripts/build_and_push.sh
          ./scripts/build_and_push.sh

      - name: Deploy ECS services
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
        run: |
          chmod +x scripts/deploy_aws.sh
          ./scripts/deploy_aws.sh

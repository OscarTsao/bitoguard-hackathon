    BankAccountRecord:
      properties:
        bank_account_id:
          type: string
          title: Bank Account Id
        bank_code:
          anyOf:
          - type: string
          - type: 'null'
          title: Bank Code
        bank_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Bank Name
        country:
          anyOf:
          - type: string
          - type: 'null'
          title: Country
        currency:
          anyOf:
          - type: string
          - type: 'null'
          title: Currency
        opened_at:
          type: string
          title: Opened At
      type: object
      required:
      - bank_account_id
      - bank_code
      - bank_name
      - country
      - currency
      - opened_at
      title: BankAccountRecord
    BankAccountsPage:
      properties:
        items:
          items:
            $ref: '#/components/schemas/BankAccountRecord'
          type: array
          title: Items
        page:
          type: integer
          title: Page
        page_size:
          type: integer
          title: Page Size
        total:
          type: integer
          title: Total
        has_next:
          type: boolean
          title: Has Next
      type: object
      required:
      - items
      - page
      - page_size
      - total
      - has_next
      title: PaginatedBankAccountsResponse
